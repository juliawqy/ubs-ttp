apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ubs-ttp-recruitment
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/ubs-ttp.git
    targetRevision: HEAD
    path: k8s/overlays/staging/recruitment
  destination:
    server: https://kubernetes.default.svc
    namespace: ubs-ttp-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
