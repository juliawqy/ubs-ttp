apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aequus-ai-assistant
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/aequus.git
    targetRevision: HEAD
    path: k8s/overlays/staging/ai-assistant
  destination:
    server: https://kubernetes.default.svc
    namespace: aequus-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
