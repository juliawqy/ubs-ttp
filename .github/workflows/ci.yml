name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      shared: ${{ steps.filter.outputs.shared }}
      recruitment: ${{ steps.filter.outputs.recruitment }}
      training: ${{ steps.filter.outputs.training }}
      performance: ${{ steps.filter.outputs.performance }}
      ai-assistant: ${{ steps.filter.outputs.ai-assistant }}
      analytics: ${{ steps.filter.outputs.analytics }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            shared:
              - 'services/shared/**'
            recruitment:
              - 'services/recruitment/**'
            training:
              - 'services/training/**'
            performance:
              - 'services/performance/**'
            ai-assistant:
              - 'services/ai-assistant/**'
            analytics:
              - 'services/analytics/**'

  lint-and-test-python:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [shared, recruitment, training, performance, ai-assistant, analytics]
    if: ${{ needs.detect-changes.outputs[matrix.service] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install ruff pytest pytest-cov bandit safety
      - name: Lint (ruff)
        run: ruff check services/${{ matrix.service }}
      - name: Security scan (bandit)
        run: bandit -r services/${{ matrix.service }} -ll -q
      - name: Dependency CVE scan (safety)
        run: safety check -r services/${{ matrix.service }}/requirements.txt
      - name: Test (pytest)
        run: pytest services/${{ matrix.service }}/tests -v --cov=services/${{ matrix.service }} --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4

  lint-and-test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Check for syntax errors
        run: node --check frontend/src/server.js

  docker-build-check:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [recruitment, training, performance, ai-assistant, analytics]
    if: ${{ needs.detect-changes.outputs[matrix.service] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: services
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
