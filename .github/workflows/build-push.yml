name: Build & Push to ECR (Staging)

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, recruitment, training, performance, ai-assistant, analytics]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ubs-ttp-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/ubs-ttp-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update staging image tag
        run: |
          sed -i "s|image: .*ubs-ttp-${{ matrix.service }}:.*|image: ${{ env.ECR_REGISTRY }}/ubs-ttp-${{ matrix.service }}:${{ github.sha }}|" \
            k8s/overlays/staging/${{ matrix.service }}/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/${{ matrix.service }}/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update staging ${{ matrix.service }} to ${{ github.sha }}"
          git push

  build-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ubs-ttp-frontend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/ubs-ttp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update staging frontend image tag
        run: |
          sed -i "s|image: .*ubs-ttp-frontend:.*|image: ${{ env.ECR_REGISTRY }}/ubs-ttp-frontend:${{ github.sha }}|" \
            k8s/overlays/staging/frontend/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/frontend/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update staging frontend to ${{ github.sha }}"
          git push
