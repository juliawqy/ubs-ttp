name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    strategy:
      matrix:
        service: [api-gateway, recruitment, training, performance, ai-assistant, analytics]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Retag image for production
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name ubs-ttp-${{ matrix.service }} \
            --image-ids imageTag=latest \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --repository-name ubs-ttp-${{ matrix.service }} \
            --image-tag ${{ github.ref_name }} \
            --image-manifest "$MANIFEST"

      - name: Update production image tag
        run: |
          sed -i "s|image: .*ubs-ttp-${{ matrix.service }}:.*|image: ${{ env.ECR_REGISTRY }}/ubs-ttp-${{ matrix.service }}:${{ github.ref_name }}|" \
            k8s/overlays/production/${{ matrix.service }}/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/${{ matrix.service }}/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: promote ${{ matrix.service }} ${{ github.ref_name }} to production"
          git push

  promote-frontend-to-prod:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Retag frontend image for production
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name ubs-ttp-frontend \
            --image-ids imageTag=latest \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --repository-name ubs-ttp-frontend \
            --image-tag ${{ github.ref_name }} \
            --image-manifest "$MANIFEST"

      - name: Update production frontend image tag
        run: |
          sed -i "s|image: .*ubs-ttp-frontend:.*|image: ${{ env.ECR_REGISTRY }}/ubs-ttp-frontend:${{ github.ref_name }}|" \
            k8s/overlays/production/frontend/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/frontend/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: promote frontend ${{ github.ref_name }} to production"
          git push
