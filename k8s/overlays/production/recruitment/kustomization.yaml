apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ubs-ttp-production
resources:
  - ../../../base/recruitment
images:
  - name: PLACEHOLDER
    newName: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-southeast-1.amazonaws.com/ubs-ttp-recruitment
    newTag: latest  # replaced by CI pipeline
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: recruitment
