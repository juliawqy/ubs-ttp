version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ubs_ttp
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: ubs_ttp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: ap-southeast-1

  recruitment:
    build:
      context: ./services
      dockerfile: recruitment/Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    depends_on: [postgres, localstack]

  training:
    build:
      context: ./services
      dockerfile: training/Dockerfile
    ports:
      - "8002:8000"
    env_file: .env
    depends_on: [postgres]

  performance:
    build:
      context: ./services
      dockerfile: performance/Dockerfile
    ports:
      - "8003:8000"
    env_file: .env
    depends_on: [postgres]

  ai-assistant:
    build:
      context: ./services
      dockerfile: ai-assistant/Dockerfile
    ports:
      - "8004:8000"
    env_file: .env
    depends_on: [postgres]

  analytics:
    build:
      context: ./services
      dockerfile: analytics/Dockerfile
    ports:
      - "8005:8000"
    env_file: .env
    depends_on: [postgres]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://recruitment:8000
    depends_on: [recruitment, training, performance, ai-assistant, analytics]

volumes:
  pgdata:
