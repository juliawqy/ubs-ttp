version: "3.9"

name: aequus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aequus
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: aequus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: ap-southeast-1

  recruitment:
    build:
      context: ./services
      dockerfile: recruitment/Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    depends_on: [postgres, localstack]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=2).raise_for_status()\""]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  training:
    build:
      context: ./services
      dockerfile: training/Dockerfile
    ports:
      - "8002:8000"
    env_file: .env
    depends_on: [postgres]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=2).raise_for_status()\""]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  performance:
    build:
      context: ./services
      dockerfile: performance/Dockerfile
    ports:
      - "8003:8000"
    env_file: .env
    depends_on: [postgres]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=2).raise_for_status()\""]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  ai-assistant:
    build:
      context: ./services
      dockerfile: ai-assistant/Dockerfile
    ports:
      - "8004:8000"
    env_file: .env
    depends_on: [postgres]

  analytics:
    build:
      context: ./services
      dockerfile: analytics/Dockerfile
    ports:
      - "8005:8000"
    env_file: .env
    depends_on: [postgres]

  seeder:
    build:
      context: .
      dockerfile: tools/Dockerfile.seeder
    environment:
      REC_URL: http://recruitment:8000
      PERF_URL: http://performance:8000
      TR_URL: http://training:8000
    depends_on:
      recruitment:
        condition: service_healthy
      performance:
        condition: service_healthy
      training:
        condition: service_healthy
    restart: "no"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://recruitment:8000
      - TRAINING_API_URL=http://training:8000
      - PERFORMANCE_API_URL=http://performance:8000
      - ANALYTICS_API_URL=http://analytics:8000
    depends_on: [recruitment, training, performance, ai-assistant, analytics]

volumes:
  pgdata:
