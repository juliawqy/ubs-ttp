version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ubs_ttp
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: ubs_ttp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: ap-southeast-1

  recruitment:
    build: ./services/recruitment
    ports:
      - "8001:8000"
    env_file: .env
    depends_on: [postgres, localstack]
    volumes:
      - ./services/recruitment/app:/app/app
      - ./services/shared:/app/shared

  training:
    build: ./services/training
    ports:
      - "8002:8000"
    env_file: .env
    depends_on: [postgres]
    volumes:
      - ./services/training/app:/app/app
      - ./services/shared:/app/shared

  performance:
    build: ./services/performance
    ports:
      - "8003:8000"
    env_file: .env
    depends_on: [postgres]
    volumes:
      - ./services/performance/app:/app/app
      - ./services/shared:/app/shared

  ai-assistant:
    build: ./services/ai-assistant
    ports:
      - "8004:8000"
    env_file: .env
    depends_on: [postgres]
    volumes:
      - ./services/ai-assistant/app:/app/app
      - ./services/shared:/app/shared

  analytics:
    build: ./services/analytics
    ports:
      - "8005:8000"
    env_file: .env
    depends_on: [postgres]
    volumes:
      - ./services/analytics/app:/app/app
      - ./services/shared:/app/shared

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://recruitment:8000
    depends_on: [recruitment, training, performance, ai-assistant, analytics]

volumes:
  pgdata:
